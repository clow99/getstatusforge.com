services:
  statusforge-demo:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Statusforge}
    container_name: statusforge-demo
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
